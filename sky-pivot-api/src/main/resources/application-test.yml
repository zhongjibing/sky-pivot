# Test Profile
# Usage: SPRING_PROFILES_ACTIVE=test (used by unit/integration tests)
spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:sky_pivot_test;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  flyway:
    enabled: false

  cloud:
    vault:
      enabled: false

logging:
  level:
    com.icezhg.sky.pivot: WARN
    org.springframework: WARN

management:
  endpoint:
    health:
      show-details: never
