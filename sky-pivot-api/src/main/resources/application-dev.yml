# Development Profile
# Usage: SPRING_PROFILES_ACTIVE=dev
spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:./data/sky_pivot_dev;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
    clean-disabled: false

  cloud:
    vault:
      enabled: false

logging:
  level:
    com.icezhg.sky.pivot: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

management:
  endpoint:
    health:
      show-details: always
